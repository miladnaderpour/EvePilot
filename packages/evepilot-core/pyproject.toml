[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evepilot-core"
version = "0.1.0"
description = "Shared core utilities for EvePilot."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
